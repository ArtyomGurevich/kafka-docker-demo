version: "3.8"

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${HOST_IP}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - kafka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    restart: unless-stopped

  topic-init:
    image: apache/kafka:latest
    container_name: topic-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    command: >
      sh -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic orders --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payments --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic notifications --partitions 1 --replication-factor 1
      "
    restart: "no"

  orders-producer:
    build: ./python-kafka-base
    container_name: orders-producer
    volumes:
      - ./orders_producer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  payments-producer:
    build: ./python-kafka-base
    container_name: payments-producer
    volumes:
      - ./payments_producer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  notifications-producer:
    build: ./python-kafka-base
    container_name: notifications-producer
    volumes:
      - ./notifications_producer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  orders-consumer:
    build: ./python-kafka-base
    container_name: orders-consumer
    volumes:
      - ./orders_consumer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  payments-consumer:
    build: ./python-kafka-base
    container_name: payments-consumer
    volumes:
      - ./payments_consumer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  notifications-consumer:
    build: ./python-kafka-base
    container_name: notifications-consumer
    volumes:
      - ./notifications_consumer.py:/app/app.py
    working_dir: /app
    command: ["python", "app.py"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge

volumes:
  kafka_data:
    driver: local
